<body>
    <div class="login-container">
        <h1>campUs cAre Log</h1>
        <p class="subtitle">Enter your clinic name and password to access the system</p>
        
        <?php if (isset($_GET['error'])): ?>
            <div class="error-message">
                <?php 
                if ($_GET['error'] == 'empty') {
                    echo 'Please enter both clinic name and password';
                } elseif ($_GET['error'] == 'wrong_clinic_name') {
                    echo 'Incorrect clinic name. Please try again.';
                } elseif ($_GET['error'] == 'wrong_password') {
                    echo 'Incorrect password. Please try again.';
                } elseif ($_GET['error'] == 'logged_out') {
                    echo 'You have been logged out successfully.';
                } elseif ($_GET['error'] == 'not_logged_in') {
                    echo 'Please login to access the dashboard.';
                } elseif ($_GET['error'] == 'session_timeout') {
                    echo 'Your session has expired. Please login again.';
                }
                ?>
            </div>
        <?php endif; ?>
        
        <form action="login.php" method="POST">
            <div class="form-group">
                <label for="clinic_name">Clinic Name</label>
                <input type="text" 
                       id="clinic_name" 
                       name="clinic_name" 
                       placeholder="Enter your clinic name" 
                       required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       placeholder="Enter your password" 
                       required>
            </div>
            
            <button type="submit" class="login-btn">Login</button>
        </form>
        
        <div class="security-note">
            <strong>Security Note:</strong> Only authorized administrators can access this system. All activities are logged.
        </div>
    </div>
</body>
</html>
